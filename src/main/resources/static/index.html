<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
background:rgba(255,255,255,0.95);
border-radius:30px;
padding:40px;
box-shadow:0 20px 60px rgba(0,0,0,0.3);
max-width:500px;
width:100%;
}

h1{
text-align:center;
color:#667eea;
margin-bottom:30px;
font-size:2.5em;
}

.search-box{
display:flex;
gap:10px;
margin-bottom:30px;
}

input{
flex:1;
padding:15px 20px;
border:2px solid #e0e0e0;
border-radius:50px;
font-size:16px;
}

button{
padding:15px 30px;
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
color:white;
border:none;
border-radius:50px;
cursor:pointer;
font-size:16px;
font-weight:bold;
}

.weather-card{
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
border-radius:20px;
padding:30px;
color:white;
display:none;
}

.weather-card.show{
display:block;
}

.city-name{
font-size:2em;
margin-bottom:10px;
text-align:center;
}

.temperature{
font-size:4em;
font-weight:bold;
text-align:center;
margin:20px 0;
}

.description{
text-align:center;
font-size:1.3em;
text-transform:capitalize;
margin-bottom:30px;
}

.weather-details{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.detail-item{
background:rgba(255,255,255,0.2);
padding:15px;
border-radius:15px;
text-align:center;
}

.detail-label{
font-size:0.9em;
margin-bottom:5px;
}

.detail-value{
font-size:1.5em;
font-weight:bold;
}

.error{
background:#ff6b6b;
color:white;
padding:15px;
border-radius:15px;
text-align:center;
display:none;
margin-bottom:20px;
}

.error.show{
display:block;
}

.loading{
text-align:center;
color:#667eea;
font-size:1.2em;
display:none;
}

.loading.show{
display:block;
}

.weather-icon{
font-size:5em;
text-align:center;
margin:20px 0;
}

</style>
</head>

<body>

<div class="container">

<h1>☁️ Jesus Caraballo Weather App</h1>

<div class="search-box">
<input type="text" id="cityInput" placeholder="Ingresa una ciudad">
<button onclick="getWeather()">Buscar</button>
</div>

<div id="error" class="error"></div>
<div id="loading" class="loading">Cargando...</div>

<div class="weather-card" id="weatherCard">

<div id="cityName" class="city-name"></div>
<div id="weatherIcon" class="weather-icon"></div>
<div id="temperature" class="temperature"></div>
<div id="description" class="description"></div>

<div class="weather-details">

<div class="detail-item">
<div class="detail-label">Sensación</div>
<div id="feelsLike" class="detail-value"></div>
</div>

<div class="detail-item">
<div class="detail-label">Humedad</div>
<div id="humidity" class="detail-value"></div>
</div>

<div class="detail-item">
<div class="detail-label">Viento</div>
<div id="windSpeed" class="detail-value"></div>
</div>

<div class="detail-item">
<div class="detail-label">País</div>
<div id="country" class="detail-value"></div>
</div>

</div>
</div>
</div>

<script>

const API_URL = "/api/weather/city/";

document.getElementById("cityInput").addEventListener("keypress",function(e){
if(e.key==="Enter"){
getWeather();
}
});

function getWeather(){

const city=document.getElementById("cityInput").value.trim();

if(!city){
showError("Ingresa una ciudad");
return;
}

showLoading(true);
hideError();
hideWeatherCard();

fetch(API_URL+encodeURIComponent(city))
.then(response=>{
if(!response.ok){
throw new Error("Ciudad no encontrada");
}
return response.json();
})
.then(data=>{
showLoading(false);
displayWeather(data);
})
.catch(error=>{
showLoading(false);
showError("No se pudo obtener el clima");
});

}

function displayWeather(data){

document.getElementById("cityName").textContent=data.city+", "+data.country;
document.getElementById("temperature").textContent=Math.round(data.temperature)+"°C";
document.getElementById("description").textContent=data.description;
document.getElementById("feelsLike").textContent=Math.round(data.feelsLike)+"°C";
document.getElementById("humidity").textContent=data.humidity+"%";
document.getElementById("windSpeed").textContent=data.windSpeed+" m/s";
document.getElementById("country").textContent=data.country;

document.getElementById("weatherCard").classList.add("show");

}

function showLoading(show){
document.getElementById("loading").classList.toggle("show",show);
}

function hideWeatherCard(){
document.getElementById("weatherCard").classList.remove("show");
}

function showError(message){
const error=document.getElementById("error");
error.textContent=message;
error.classList.add("show");
}

function hideError(){
document.getElementById("error").classList.remove("show");
}

window.onload=function(){
document.getElementById("cityInput").value="Santiago";
getWeather();
};

</script>

</body>
</html>
